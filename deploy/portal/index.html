<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#bd352f" />
    <title>アプリポータル</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f7f7f5;
        color: #1f2933;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
        padding: 24px;
      }
      .wrap { width: 100%; max-width: 460px; }
      h1 { font-size: 1.5rem; margin: 0 0 4px; }
      p.sub { margin: 0 0 20px; color: #6b7280; font-size: 0.9rem; }
      a.card {
        display: block;
        text-decoration: none;
        color: inherit;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 16px 18px;
        margin-bottom: 12px;
        transition: border-color .15s, transform .05s;
      }
      a.card:hover { border-color: #d24b44; }
      a.card:active { transform: scale(0.99); }
      .title { font-weight: 700; font-size: 1.05rem; }
      .desc { color: #6b7280; font-size: 0.85rem; margin-top: 2px; }
      .emoji { font-size: 1.3rem; margin-right: 8px; }
      footer { margin-top: 16px; text-align: center; color: #9ca3af; font-size: 0.7rem; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>アプリポータル</h1>
      <p class="sub">利用するアプリを選んでください</p>

      <a class="card" href="/marumie">
        <div class="title"><span class="emoji">🔍</span>まるみえ</div>
        <div class="desc">まるみえアプリ</div>
      </a>

      <a class="card" href="/onepiece">
        <div class="title"><span class="emoji">🏴‍☠️</span>ONE PIECE クイズ</div>
        <div class="desc">難易度別の4択クイズに挑戦</div>
      </a>

      <a class="card" href="/tasks/">
        <div class="title"><span class="emoji">✅</span>タスク管理</div>
        <div class="desc">Claudeへの依頼メモ</div>
      </a>

      <a class="card" href="/agents/">
        <div class="title"><span class="emoji">🤖</span>エージェント / ダイケイモニター</div>
        <div class="desc">登録エージェント・プラグイン管理・ダイケイ監視ログ</div>
      </a>

      <!-- 今後のアプリはここに <a class="card" href="/xxx"> を追加 -->

      <footer>個人利用・学習目的のツール群</footer>
    </main>
  </body>
</html>
