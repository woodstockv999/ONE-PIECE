<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#bd352f" />
    <title>アプリポータル</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f7f7f5;
        color: #1f2933;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
        padding: 24px;
      }
      .wrap { width: 100%; max-width: 460px; }
      h1 { font-size: 1.5rem; margin: 0 0 4px; }
      p.sub { margin: 0 0 20px; color: #6b7280; font-size: 0.9rem; }

      .card-list { list-style: none; margin: 0; padding: 0; }

      .card-item {
        margin-bottom: 12px;
        cursor: grab;
      }
      .card-item:active { cursor: grabbing; }
      .card-item.dragging { opacity: 0.4; }
      .card-item.drag-over > a.card { border-color: #d24b44; border-style: dashed; }

      a.card {
        display: flex;
        align-items: center;
        text-decoration: none;
        color: inherit;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 16px 18px;
        transition: border-color .15s, transform .05s;
        gap: 10px;
      }
      a.card:hover { border-color: #d24b44; }
      a.card:active { transform: scale(0.99); }
      .card-body { flex: 1; min-width: 0; }
      .title { font-weight: 700; font-size: 1.05rem; }
      .desc { color: #6b7280; font-size: 0.85rem; margin-top: 2px; }
      .emoji { font-size: 1.3rem; flex-shrink: 0; }
      .drag-handle {
        color: #d1d5db;
        font-size: 1rem;
        flex-shrink: 0;
        user-select: none;
        line-height: 1;
      }
      footer { margin-top: 16px; text-align: center; color: #9ca3af; font-size: 0.7rem; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>アプリポータル</h1>
      <p class="sub">利用するアプリを選んでください</p>
      <ul class="card-list" id="cardList"></ul>
      <footer>個人利用・学習目的のツール群</footer>
    </main>

    <script>
      const APPS = [
        { id: 'marumie',  href: '/marumie',   emoji: '🔍', title: 'まるみえ',                        desc: 'まるみえアプリ' },
        { id: 'onepiece', href: '/onepiece',  emoji: '🏴‍☠️', title: 'ONE PIECE クイズ',               desc: '難易度別の4択クイズに挑戦' },
        { id: 'tasks',    href: '/tasks/',    emoji: '✅', title: 'タスク管理',                       desc: 'Claudeへの依頼メモ' },
        { id: 'agents',   href: '/agents/',   emoji: '🤖', title: 'エージェント / ダイケイモニター', desc: '登録エージェント・プラグイン管理・ダイケイ監視ログ' },
      ];

      const STORAGE_KEY = 'portal-order';

      function loadOrder() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
          if (Array.isArray(saved)) {
            const ordered = saved.map(id => APPS.find(a => a.id === id)).filter(Boolean);
            const rest = APPS.filter(a => !saved.includes(a.id));
            return [...ordered, ...rest];
          }
        } catch {}
        return APPS;
      }

      function saveOrder(items) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(items.map(a => a.id)));
      }

      function renderList(items) {
        const list = document.getElementById('cardList');
        list.innerHTML = '';
        items.forEach(app => {
          const li = document.createElement('li');
          li.className = 'card-item';
          li.draggable = true;
          li.dataset.id = app.id;
          li.innerHTML = `
            <a class="card" href="${app.href}">
              <span class="drag-handle">⠿</span>
              <span class="emoji">${app.emoji}</span>
              <div class="card-body">
                <div class="title">${app.title}</div>
                <div class="desc">${app.desc}</div>
              </div>
            </a>`;
          list.appendChild(li);
        });
        attachDrag();
      }

      let dragSrc = null;

      function attachDrag() {
        const items = document.querySelectorAll('.card-item');
        items.forEach(item => {
          item.addEventListener('dragstart', e => {
            dragSrc = item;
            item.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
          });
          item.addEventListener('dragend', () => {
            item.classList.remove('dragging');
            document.querySelectorAll('.card-item').forEach(i => i.classList.remove('drag-over'));
            const newOrder = [...document.querySelectorAll('.card-item')].map(
              el => APPS.find(a => a.id === el.dataset.id)
            ).filter(Boolean);
            saveOrder(newOrder);
          });
          item.addEventListener('dragover', e => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            if (dragSrc && dragSrc !== item) {
              document.querySelectorAll('.card-item').forEach(i => i.classList.remove('drag-over'));
              item.classList.add('drag-over');
            }
          });
          item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
          item.addEventListener('drop', e => {
            e.preventDefault();
            if (!dragSrc || dragSrc === item) return;
            const list = item.parentNode;
            const allItems = [...list.querySelectorAll('.card-item')];
            const srcIdx = allItems.indexOf(dragSrc);
            const dstIdx = allItems.indexOf(item);
            if (srcIdx < dstIdx) {
              list.insertBefore(dragSrc, item.nextSibling);
            } else {
              list.insertBefore(dragSrc, item);
            }
          });

          // タッチ対応（長押し→スクロール防止でドラッグ）
          let touchStartY, touchItem, touchClone, touchOffset;
          item.addEventListener('touchstart', e => {
            touchItem = item;
            touchStartY = e.touches[0].clientY;
          }, { passive: true });
          item.addEventListener('touchmove', e => {
            if (!touchItem) return;
            const dy = Math.abs(e.touches[0].clientY - touchStartY);
            if (dy > 8) e.preventDefault();
          }, { passive: false });
        });
      }

      renderList(loadOrder());
    </script>
  </body>
</html>
