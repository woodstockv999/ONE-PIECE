# /etc/nginx/sites-available/portal
#
# ポータル + 複数アプリのサブパス配信構成。
#   /          → 静的ポータル（選択画面）
#   /marumie   → まるみえ（127.0.0.1:3000）
#   /onepiece  → ONE PIECE クイズ（127.0.0.1:3001）
#   /<app3>    → 今後のアプリ（127.0.0.1:3002）…
#
# 重要: サブパス配信する各 Next.js アプリは basePath をそのパスに合わせること。
#   ONE PIECE: NEXT_PUBLIC_BASE_PATH=/onepiece（既定）でビルド済み。
#   marumie  : 既存アプリ側も basePath="/marumie" 相当の設定が必要
#              （未設定だと CSS/JS が 404 になり画面が崩れる）。

# 各アプリ共通で使う proxy 設定
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name 210.131.212.62;  # 独自ドメインに変えたらここも変更

    # ---- ポータル（ルートのみ） ----
    location = / {
        root /var/www/portal;
        index index.html;
    }

    # ---- まるみえ（:3000） ----
    location /marumie/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }

    # ---- ONE PIECE クイズ（:3001） ----
    location /onepiece/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;  # 最新話モードの Web 検索は時間がかかるため長め
    }

    # /onepiece （末尾スラッシュなし）でのアクセスを正規化
    location = /onepiece {
        return 308 /onepiece/;
    }
    location = /marumie {
        return 308 /marumie/;
    }

    # ---- 今後のアプリ追加テンプレ（:3002 など） ----
    # location /app3/ {
    #     proxy_pass http://127.0.0.1:3002;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
